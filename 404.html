<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Balance Acupuncture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--cream);
      padding: 2rem;
    }
    .error-inner { max-width: 540px; }
    .error-num {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 300;
      color: var(--sage-light);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-inner h1 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-style: italic;
      margin-bottom: 1rem;
    }
    .error-inner p { margin-bottom: 2.5rem; max-width: 420px; margin-left: auto; margin-right: auto; }
    .error-links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-inner">
      <div class="error-num">404</div>
      <div class="divider"></div>
      <h1>Page not found</h1>
      <p>The page you are looking for may have moved or no longer exists. Please use the links below to find what you need.</p>
      <div class="error-links">
        <a href="index.html" class="btn btn--filled">Return Home</a>
        <a href="contact.html" class="btn btn--sage">Contact Us</a>
      </div>
    </div>
  </div>
</body>
</html>
